name: Daily News Digest

on:
  schedule:
    - cron: '0 7 * * *'   # 7:00 AM UTC every day
  workflow_dispatch:        # Allow manual runs from the GitHub Actions UI

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send news digest
        env:
          # API keys — store these in GitHub repo Settings → Secrets and variables → Actions → Secrets
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # Topic config — store in Settings → Secrets and variables → Actions → Variables
          # (Variables are not secret and show up in logs, which is fine for a topic name)
          NEWS_TOPIC: ${{ vars.NEWS_TOPIC }}
          NUM_ARTICLES: ${{ vars.NUM_ARTICLES }}
        run: python news_digest.py
